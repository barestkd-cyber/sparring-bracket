<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparring Bracket Prototype v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #e2e6ed; font-family: system-ui, sans-serif; padding: 16px; }

h1 { font-size: 20px; color: #f0b429; letter-spacing: 1px; margin-bottom: 4px; }
.subtitle { font-size: 11px; color: #4a4f5a; font-family: monospace; margin-bottom: 16px; letter-spacing: 1px; }
h2 { font-size: 11px; font-family: monospace; letter-spacing: 2px; text-transform: uppercase;
     color: #6b7280; margin: 20px 0 8px; border-bottom: 1px solid #1e2028; padding-bottom: 5px; }
h2.w { color: #f0b429; } h2.l { color: #60a5fa; }

/* SETUP */
#setup { max-width: 520px; margin: 0 auto; }
.quick-btns { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
.qb { padding:5px 13px; background:#1a1d24; border:1px solid #2d3139; color:#e2e6ed;
      border-radius:6px; cursor:pointer; font-size:13px; }
.qb:hover { border-color:#f0b429; color:#f0b429; }
.qb.active { background:#f0b429; color:#0f1117; border-color:#f0b429; font-weight:700; }
.qb-random { padding:5px 13px; background:#1a2a1a; border:1px solid #2a4a2a; color:#68d391;
             border-radius:6px; cursor:pointer; font-size:13px; font-weight:700; }
.qb-random:hover { border-color:#68d391; background:#1e3a1e; }
.comp-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.comp-num { font-family:monospace; font-size:11px; color:#f0b429; width:18px; flex-shrink:0; }
.comp-row input { flex:1; background:#1a1d24; border:1px solid #2d3139; color:#e2e6ed;
                  border-radius:6px; padding:7px 10px; font-size:13px; }
.comp-row input:focus { outline:none; border-color:#f0b429; }
.comp-school { flex:0 0 100px !important; font-size:12px !important; color:#9ca3af !important; }
.sbtn { width:28px; height:28px; background:transparent; border:1px solid #2d3139;
        color:#6b7280; border-radius:5px; cursor:pointer; font-size:12px; flex-shrink:0; }
.sbtn.scratched { border-color:#e53e3e; color:#e53e3e; background:rgba(229,62,62,0.08); }
.comp-row.scratched input { text-decoration:line-through; color:#4a4f5a; }
.btn-go { background:#f0b429; border:none; color:#0f1117; padding:10px 22px;
          border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
.btn-go:hover { background:#f5c842; }
/* School tag in bracket slot */
.school-tag { font-size:9px; color:#4a5a6a; font-family:monospace; margin-left:5px;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:1; }
/* Forms mode indicator */
.forms-mode .comp-num { color:#f0b429; }
/* Mobile tweaks */
@media (max-width:500px) {
  .comp-school { flex:0 0 72px !important; font-size:11px !important; }
}

/* BRACKET DISPLAY */
#bd { display:none; }
#ctrl { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.btn-s { background:transparent; border:1px solid #2d3139; color:#e2e6ed;
         padding:6px 13px; border-radius:6px; font-size:12px; cursor:pointer; }
.btn-s:hover { border-color:#6b7280; }
.btn-d { background:transparent; border:1px solid #e53e3e; color:#e53e3e;
         padding:6px 13px; border-radius:6px; font-size:12px; cursor:pointer; }

/* SEQUENCE BAR */
#seq-bar { background:#111318; border:1px solid #1e2028; border-radius:8px;
           padding:10px 14px; margin-bottom:14px; overflow-x:auto; }
#seq-bar-inner { display:flex; gap:6px; align-items:center; flex-wrap:nowrap; min-width:max-content; }
.seq-chip { padding:4px 10px; border-radius:5px; font-family:monospace; font-size:11px;
            font-weight:700; letter-spacing:1px; border:1px solid transparent; white-space:nowrap; }
.seq-chip.done  { background:#0d1a10; border-color:#2d4a30; color:#4a7a50; text-decoration:line-through; }
.seq-chip.next  { background:#f0b429; color:#0f1117; border-color:#f0b429; font-size:12px; }
.seq-chip.soon  { background:#1a2040; border-color:#3b4a6b; color:#7a9acb; }
.seq-chip.later { background:#1a1d24; border-color:#252830; color:#4a4f5a; }
.seq-sep { color:#3a3f4a; font-size:14px; }

/* PLACEMENTS */
#placements { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.pc { padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; }
.pc.p1 { background:rgba(240,180,41,0.12); border:1px solid #f0b429; color:#f0b429; }
.pc.p2 { background:rgba(156,163,175,0.08); border:1px solid #9ca3af; color:#d1d5db; }
.pc.p3 { background:rgba(180,83,9,0.08); border:1px solid #b45309; color:#d97706; }

/* BRACKET TREE */
.bscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:8px; margin-bottom:4px; }
.binner  { position:relative; margin:0 auto; }

/* MATCH CARD */
.mc { position:absolute; width:180px; background:#161920;
      border:2px solid #252830; border-radius:8px; overflow:hidden; }
.mc.bye   { border-color:#1a1d24; opacity:0.45; }
.mc.done  { border-color:#2d4a30; }
.mc.ready { border-color:#4a5a30; }
.mc.next  { border-color:#f0b429; box-shadow:0 0 16px rgba(240,180,41,0.22); }
.mc.wf    { border-color:#c09010; }
.mc.lf    { border-color:#2060a0; }
.mc.next.lf { border-color:#60a5fa; box-shadow:0 0 20px rgba(96,165,250,0.25); }

.mc-hd { padding:4px 8px; background:#111318; display:flex; justify-content:space-between;
         align-items:center; font-family:monospace; font-size:10px; }
.mc-id { font-weight:800; font-size:13px; }
.mc.bye  .mc-id { color:#3a3f4a; }
.mc.done .mc-id { color:#4a7a50; }
.mc.ready .mc-id { color:#8aaa40; }
.mc.next  .mc-id { color:#f0b429; }
.mc-lbl { color:#4a4f5a; letter-spacing:1px; text-transform:uppercase; font-size:9px; }
.mc.wf .mc-lbl { color:#a07820; }
.mc.lf .mc-lbl { color:#4080b0; }

.mc-slot { padding:0 10px; height:38px; display:flex; align-items:center;
           font-size:12px; border-top:1px solid #1a1d24; }
.mc-slot.click { cursor:pointer; }
.mc-slot.click:hover  { background:rgba(240,180,41,0.1); }
.mc-slot.click:active { background:rgba(240,180,41,0.2); }
.mc-slot.won  { color:#68d391; font-weight:700; background:rgba(56,161,105,0.06); }
.mc-slot.lost { color:#2a3040; text-decoration:line-through; }
.mc-slot.tbd  { color:#3a3f4a; font-style:italic; font-size:11px; }
.mc-slot.bye-s{ color:#3a3f4a; font-size:11px; font-style:italic; }
.tap-hint { font-size:9px; margin-left:auto; background:#f0b429; color:#0f1117;
            border-radius:3px; padding:1px 5px; font-weight:800; letter-spacing:1px; flex-shrink:0; }

/* WINNER ENTRY MODAL */
#winner-modal-bg {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:1000; align-items:center; justify-content:center; padding:20px;
}
#winner-modal-bg.open { display:flex; }
#winner-modal {
  background:#161920; border:2px solid #f0b429; border-radius:12px;
  padding:20px; width:100%; max-width:340px;
  box-shadow:0 0 40px rgba(240,180,41,0.25);
}
#winner-modal h3 {
  font-family:monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:#f0b429; margin-bottom:6px;
}
#winner-modal .vs-line {
  font-size:13px; color:#9ca3af; margin-bottom:14px; line-height:1.6;
}
#winner-modal .vs-line strong { color:#e2e6ed; }
#winner-modal .hint {
  font-family:monospace; font-size:10px; color:#6b7280; margin-bottom:8px;
  letter-spacing:0.5px;
}
#winner-entry-input {
  width:100%; background:#0f1117; border:1px solid #f0b429; color:#e2e6ed;
  border-radius:7px; padding:11px 14px; font-size:15px; -webkit-appearance:none;
  margin-bottom:6px;
}
#winner-entry-input:focus { outline:none; border-color:#f5c842; }
#winner-entry-error {
  display:none; color:#e53e3e; font-size:11px; font-family:monospace;
  margin-bottom:10px; line-height:1.4;
}
#winner-modal .modal-btns { display:flex; gap:8px; margin-top:10px; }
#winner-confirm-btn {
  flex:1; background:#38a169; border:none; border-radius:7px; padding:11px 0;
  font-family:monospace; font-size:12px; font-weight:700; color:#fff; cursor:pointer;
  letter-spacing:1px; -webkit-appearance:none; touch-action:manipulation;
}
#winner-confirm-btn:active { background:#2d8a56; }
#winner-cancel-btn {
  background:transparent; border:1px solid #3a3f4a; border-radius:7px; padding:11px 16px;
  font-family:monospace; font-size:12px; color:#6b7280; cursor:pointer;
  -webkit-appearance:none; touch-action:manipulation;
}
#winner-cancel-btn:active { border-color:#6b7280; }
</style>
</head>
<body>

<!-- WINNER ENTRY MODAL -->
<div id="winner-modal-bg">
  <div id="winner-modal">
    <h3 id="winner-modal-title">Enter Winner</h3>
    <div class="vs-line" id="winner-modal-vs"></div>
    <div class="hint" id="winner-modal-hint"></div>
    <input id="winner-entry-input" type="text" placeholder="Type name..."
      autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
    <div id="winner-entry-error"></div>
    <div class="modal-btns">
      <button id="winner-confirm-btn" onclick="confirmWinnerEntry()">✓ CONFIRM</button>
      <button id="winner-cancel-btn" onclick="cancelWinnerEntry()">✕ Cancel</button>
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="setup">
  <h1>Sparring Bracket Prototype</h1>
  <div class="subtitle">V2 — INTERLEAVED MATCH SCHEDULING</div>
  <div class="quick-btns">
    <span style="font-size:11px;color:#4a4f5a;font-family:monospace;">SLOTS →</span>
    <button class="qb" onclick="setSize(4)">4</button>
    <button class="qb" onclick="setSize(5)">5</button>
    <button class="qb active" onclick="setSize(6)">6</button>
    <button class="qb" onclick="setSize(7)">7</button>
    <button class="qb" onclick="setSize(8)">8</button>
    <span style="color:#2d3139;font-size:16px;">|</span>
    <button class="qb-random" onclick="randomFill()">⚡ Random Fill</button>
    <span style="color:#2d3139;font-size:16px;">|</span>
    <button class="qb" id="forms-toggle-btn" onclick="toggleFormsMode()" style="font-size:11px;letter-spacing:0.5px;">📋 Forms Score</button>
  </div>
  <div id="forms-hint" style="display:none;font-family:monospace;font-size:10px;color:#6b7280;margin-bottom:8px;line-height:1.5;">
    FORMS MODE — enter competitors by placement, top to bottom. Last place gets the bye.
  </div>
  <div id="comp-list"></div>
  <button class="btn-go" onclick="buildBracket()">Generate Bracket →</button>
</div>

<!-- BRACKET -->
<div id="bd">
  <div id="ctrl">
    <button class="btn-s" onclick="showSetup()">← Edit</button>
    <button class="btn-s" onclick="undoLast()">↩ Undo</button>
    <button class="btn-d" onclick="resetBracket()">↺ Reset</button>
    <span id="next-label" style="font-family:monospace;font-size:12px;color:#f0b429;margin-left:6px;"></span>
  </div>

  <div id="seq-bar"><div id="seq-bar-inner"></div></div>
  <div id="placements"></div>

  <h2 class="w">🏆 Winners Bracket</h2>
  <div class="bscroll"><div id="wb" class="binner"></div></div>

  <h2 class="l" id="lb-head">⬇ Losers Bracket</h2>
  <div class="bscroll"><div id="lb" class="binner"></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// BRACKET TEMPLATES — explicit per competitor count
// recSeq = recommended interleaved run order (byes excluded)
// ════════════════════════════════════════════════════════
const T = {

  2: {
    matches: {
      A:{br:'W',lbl:'Final',seeds:[1,2],isWF:true}
    },
    wCols:[['A']], lCols:[],
    recSeq:['A']
  },

  3: {
    matches: {
      A:{br:'W',lbl:'R1',  seeds:[1,null],isBye:true,bySeed:1},
      B:{br:'W',lbl:'R1',  seeds:[2,3]},
      C:{br:'W',lbl:'W Final',ff:{t:'winner:A',b:'winner:B'},isWF:true},
      D:{br:'L',lbl:'LB Final',ff:{t:'loser:B',b:'loser:C'},isLF:true}
    },
    wCols:[['A','B'],['C']], lCols:[['D']],
    recSeq:['B','C','D']
  },

  4: {
    // A(1v4) B(2v3) → C(LB: L(A)vL(B)), D(WF: W(A)vW(B)), E(LBF: W(C)vL(D))
    // Interleave: A,B → C ready AND D ready → play C(LB) before D(W Final)
    matches: {
      A:{br:'W',lbl:'R1',  seeds:[1,4]},
      B:{br:'W',lbl:'R1',  seeds:[2,3]},
      C:{br:'L',lbl:'LB R1',   ff:{t:'loser:A',  b:'loser:B'}},
      D:{br:'W',lbl:'W Final', ff:{t:'winner:A',b:'winner:B'},isWF:true},
      E:{br:'L',lbl:'LB Final',ff:{t:'winner:C',b:'loser:D'},isLF:true}
    },
    wCols:[['A','B'],['D']], lCols:[['C'],['E']],
    recSeq:['A','B','C','D','E']
  },

  5: {
    // 8-slot 3 byes: A(1vBYE),C(2vBYE),D(3vBYE) auto. Only B(4v5) is real R1.
    // After B: E(W Semi: W(A)vW(B)) ready, F auto (C,D byes)
    // After E: H(LB R1: L(B)vL(E)) ready — play H before G
    // After H: I(LB R2: L(F)vW(H)) ready — F already done
    // After I: G(W Final: W(E)vW(F)) — play G
    // After G: J(LB Final: W(I)vL(G))
    matches: {
      A:{br:'W',lbl:'R1',    seeds:[1,null],isBye:true,bySeed:1},
      B:{br:'W',lbl:'R1',    seeds:[4,5]},
      C:{br:'W',lbl:'R1',    seeds:[2,null],isBye:true,bySeed:2},
      D:{br:'W',lbl:'R1',    seeds:[3,null],isBye:true,bySeed:3},
      E:{br:'W',lbl:'W Semi',ff:{t:'winner:A',b:'winner:B'}},
      F:{br:'W',lbl:'W Semi',ff:{t:'winner:C',b:'winner:D'}},
      G:{br:'W',lbl:'W Final',ff:{t:'winner:E',b:'winner:F'},isWF:true},
      H:{br:'L',lbl:'LB R1', ff:{t:'loser:B', b:'loser:E'}},
      I:{br:'L',lbl:'LB R2', ff:{t:'loser:F', b:'winner:H'}},
      J:{br:'L',lbl:'LB Final',ff:{t:'winner:I',b:'loser:G'},isLF:true}
    },
    wCols:[['A','B','C','D'],['E','F'],['G']],
    lCols:[['H'],['I'],['J']],
    recSeq:['B','E','H','I','G','J']
  },

  6: {
    // 8-slot 2 byes: A(1vBYE),C(2vBYE) auto. Real R1: B(4v5), D(3v6).
    // B,D → H(LB: L(B)vL(D)), E(W Semi: W(A)vW(B)), F(W Semi: W(C)vW(D)) all ready
    // Play H(LB) before advancing too far in W
    // H done → I(LB R2: W(H)vL(E)) needs E. Play E → I ready.
    // I done → J(LB R3: L(F)vW(I)) needs F. Play F → J ready. G(WF) also ready.
    // Play J, then G, then K(LBF: W(J)vL(G))
    matches: {
      A:{br:'W',lbl:'R1',    seeds:[1,null],isBye:true,bySeed:1},
      B:{br:'W',lbl:'R1',    seeds:[4,5]},
      C:{br:'W',lbl:'R1',    seeds:[2,null],isBye:true,bySeed:2},
      D:{br:'W',lbl:'R1',    seeds:[3,6]},
      E:{br:'W',lbl:'W Semi',ff:{t:'winner:A',b:'winner:B'}},
      F:{br:'W',lbl:'W Semi',ff:{t:'winner:C',b:'winner:D'}},
      G:{br:'W',lbl:'W Final',ff:{t:'winner:E',b:'winner:F'},isWF:true},
      H:{br:'L',lbl:'LB R1', ff:{t:'loser:B', b:'loser:D'}},
      I:{br:'L',lbl:'LB R2', ff:{t:'winner:H',b:'loser:E'}},
      J:{br:'L',lbl:'LB R3', ff:{t:'loser:F', b:'winner:I'}},
      K:{br:'L',lbl:'LB Final',ff:{t:'winner:J',b:'loser:G'},isLF:true}
    },
    wCols:[['A','B','C','D'],['E','F'],['G']],
    lCols:[['H'],['I'],['J'],['K']],
    recSeq:['B','D','H','E','I','F','J','G','K']
  },

  7: {
    // 8-slot 1 bye: A(1vBYE) auto. Real R1: B(4v5),C(2v7),D(3v6).
    // After B,C,D: H(LB R1: L(C)vL(D)) ready, E(WSemi: W(A)vW(B)) ready, F(WSemi: W(C)vW(D)) ready
    // Play H → I(LB R2: L(B)vW(H)) needs B done ✓ → I ready after H
    // Play E → J(LB R3: L(E)vW(I)) needs I done
    // Play I → J ready (E+I done)
    // Play F → K(LB R4: L(F)vW(J)) needs J done
    // Play J → K ready
    // Play K → L(LBF: W(K)vL(G)) needs G done
    // Play G(WF: W(E)vW(F)) → L ready
    // Play L → done
    matches: {
      A:{br:'W',lbl:'R1',    seeds:[1,null],isBye:true,bySeed:1},
      B:{br:'W',lbl:'R1',    seeds:[4,5]},
      C:{br:'W',lbl:'R1',    seeds:[2,7]},
      D:{br:'W',lbl:'R1',    seeds:[3,6]},
      E:{br:'W',lbl:'W Semi',ff:{t:'winner:A',b:'winner:B'}},
      F:{br:'W',lbl:'W Semi',ff:{t:'winner:C',b:'winner:D'}},
      G:{br:'W',lbl:'W Final',ff:{t:'winner:E',b:'winner:F'},isWF:true},
      H:{br:'L',lbl:'LB R1', ff:{t:'loser:C', b:'loser:D'}},
      I:{br:'L',lbl:'LB R2', ff:{t:'loser:B', b:'winner:H'}},
      J:{br:'L',lbl:'LB R3', ff:{t:'loser:E', b:'winner:I'}},
      K:{br:'L',lbl:'LB R4', ff:{t:'loser:F', b:'winner:J'}},
      L:{br:'L',lbl:'LB Final',ff:{t:'winner:K',b:'loser:G'},isLF:true}
    },
    wCols:[['A','B','C','D'],['E','F'],['G']],
    lCols:[['H'],['I'],['J'],['K'],['L']],
    recSeq:['B','C','D','H','E','I','F','J','K','G','L']
  },

  8: {
    // Full 8 no byes.
    // A,B,C,D all R1 → H(LB:L(A)vL(B)), I(LB:L(C)vL(D)), E(WSemi), F(WSemi) all ready
    // Interleave: play LB R1 (H,I) alongside W Semis (E,F), then LB R2 (J,K), LB Semi (L), WF (G), LBF (M)
    matches: {
      A:{br:'W',lbl:'R1',    seeds:[1,8]},
      B:{br:'W',lbl:'R1',    seeds:[4,5]},
      C:{br:'W',lbl:'R1',    seeds:[2,7]},
      D:{br:'W',lbl:'R1',    seeds:[3,6]},
      E:{br:'W',lbl:'W Semi',ff:{t:'winner:A',b:'winner:B'}},
      F:{br:'W',lbl:'W Semi',ff:{t:'winner:C',b:'winner:D'}},
      G:{br:'W',lbl:'W Final',ff:{t:'winner:E',b:'winner:F'},isWF:true},
      H:{br:'L',lbl:'LB R1', ff:{t:'loser:A', b:'loser:B'}},
      I:{br:'L',lbl:'LB R1', ff:{t:'loser:C', b:'loser:D'}},
      J:{br:'L',lbl:'LB R2', ff:{t:'winner:H',b:'loser:E'}},
      K:{br:'L',lbl:'LB R2', ff:{t:'winner:I',b:'loser:F'}},
      L:{br:'L',lbl:'LB Semi',ff:{t:'winner:J',b:'winner:K'}},
      M:{br:'L',lbl:'LB Final',ff:{t:'winner:L',b:'loser:G'},isLF:true}
    },
    wCols:[['A','B','C','D'],['E','F'],['G']],
    lCols:[['H','I'],['J','K'],['L'],['M']],
    recSeq:['A','B','C','D','H','I','E','F','J','K','L','G','M']
  }
};

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let S = { n:0, names:[], schools:[], competitors:[], matches:{}, history:[], activeEntry:null, activeWinner:null };

// ════════════════════════════════════════════════════════
// ENGINE
// ════════════════════════════════════════════════════════
function initMatches(n, names) {
  const tmpl = T[n];
  const out  = {};
  Object.entries(tmpl.matches).forEach(([id, def]) => {
    const m = {
      id, br:def.br||'W', lbl:def.lbl,
      isBye:!!def.isBye, isWF:!!def.isWF, isLF:!!def.isLF,
      ff:def.ff||null,
      top:null, bottom:null, winner:null, loser:null, done:false
    };
    if (def.seeds) {
      m.top    = def.seeds[0] != null ? names[def.seeds[0]-1] : null;
      m.bottom = def.seeds[1] != null ? names[def.seeds[1]-1] : null;
    }
    if (def.isBye) { m.top = names[def.bySeed-1]; m.bottom = null; }
    out[id] = m;
  });
  return out;
}

function propagate(id, matches) {
  const src = matches[id];
  Object.values(matches).forEach(m => {
    if (!m.ff) return;
    ['t','b'].forEach((slot, si) => {
      const spec = m.ff[slot];
      if (!spec) return;
      const [type, srcId] = spec.split(':');
      if (srcId !== id) return;
      if (type === 'loser' && src.isBye) return; // byes produce no loser
      const val = type === 'winner' ? src.winner : src.loser;
      if (val == null) return;
      if (si === 0) m.top = val; else m.bottom = val;
    });
  });
}

function autoAdvanceByes(matches) {
  let changed = true;
  while (changed) {
    changed = false;
    Object.values(matches).forEach(m => {
      if (m.isBye && !m.done && m.top) {
        m.winner = m.top; m.loser = null; m.done = true;
        propagate(m.id, matches);
        changed = true;
      }
    });
  }
}

function isPlayable(m) {
  return !m.done && !m.isBye && !!m.top && !!m.bottom;
}

function selectWinner(matchId, winner) {
  const m = S.matches[matchId];
  if (!m || !isPlayable(m)) return;
  S.history.push(JSON.parse(JSON.stringify(S.matches)));
  m.winner = winner;
  m.loser  = winner === m.top ? m.bottom : m.top;
  m.done   = true;
  propagate(matchId, S.matches);
  render();
}

// ════════════════════════════════════════════════════════
// DISPLAY LABELS — map internal IDs to human match letters
// Only real (non-bye) matches get a visible letter A, B, C...
// Internal IDs are unchanged and still used for all logic.
// ════════════════════════════════════════════════════════
function getDisplayLabels() {
  const tmpl = T[S.n];
  const ms   = S.matches;
  const dlabels = {}; // internalId → display letter e.g. 'A','B'...
  let letterCode = 65; // 'A'

  // Assign letters in recSeq order to real matches only
  tmpl.recSeq.forEach(id => {
    const m = ms[id];
    if (!m || m.isBye) return;
    dlabels[id] = String.fromCharCode(letterCode++);
  });
  return dlabels;
}

// ════════════════════════════════════════════════════════
// SCHEDULING — sequence status per match
// ════════════════════════════════════════════════════════
function getSeqStatus() {
  const seq = T[S.n].recSeq;
  const st  = {};
  let nextFound = false;
  let soonCount = 0;

  seq.forEach(id => {
    const m = S.matches[id];
    if (!m) return;
    if (m.done) {
      st[id] = 'done';
    } else if (!nextFound && isPlayable(m)) {
      st[id] = 'next';
      nextFound = true;
    } else if (nextFound && soonCount < 3) {
      st[id] = 'soon';
      soonCount++;
    } else {
      st[id] = 'later';
    }
  });
  return st;
}

// ════════════════════════════════════════════════════════
// LAYOUT
// ════════════════════════════════════════════════════════
const CW=180, CH=97, CG=52, CT=CW+CG, RS=CH+14;

function wPositions(cols) {
  const pos={};
  cols.forEach((col,ci)=>{
    const x=ci*CT;
    const vSp=Math.pow(2,ci)*RS;
    const sY=(Math.pow(2,ci)-1)*RS/2;
    col.forEach((id,ri)=>{ pos[id]=mkPos(x, sY+ri*vSp); });
  });
  return pos;
}

function lPositions(cols) {
  const pos={};
  const maxN=cols.reduce((m,c)=>Math.max(m,c.length),0);
  const maxH=maxN===1?CH:(maxN*RS-(RS-CH));
  cols.forEach((col,ci)=>{
    const x=ci*CT;
    const colH=col.length===1?CH:(col.length*RS-(RS-CH));
    const sY=(maxH-colH)/2;
    col.forEach((id,ri)=>{ pos[id]=mkPos(x, sY+ri*RS); });
  });
  return pos;
}

function mkPos(x,y){
  return {
    x,y,
    cx:x+CW/2, cy:y+CH/2,
    rx:x+CW,   lx:x,
    topY:   y+20+19,
    botY:   y+20+1+38+19
  };
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render(){
  const tmpl=T[S.n], ms=S.matches, st=getSeqStatus();
  const dl=getDisplayLabels(); // display label map: internalId → 'A','B'...

  // Placements
  const pel=document.getElementById('placements');
  pel.innerHTML='';
  const wf=Object.values(ms).find(m=>m.isWF&&m.done);
  const lf=Object.values(ms).find(m=>m.isLF&&m.done);
  if(wf) pel.innerHTML+=`<div class="pc p1">🥇 1st — ${wf.winner}</div>`;
  if(lf){
    pel.innerHTML+=`<div class="pc p2">🥈 2nd — ${lf.winner}</div>`;
    pel.innerHTML+=`<div class="pc p3">🥉 3rd — ${lf.loser}</div>`;
  }

  // Sequence bar — only show real matches, use display label
  const sbi=document.getElementById('seq-bar-inner');
  sbi.innerHTML='';
  const realSeq = tmpl.recSeq.filter(id => ms[id] && !ms[id].isBye);
  realSeq.forEach((id,i)=>{
    const m=ms[id];
    const s=st[id]||'later';
    const ltr=dl[id]||'?';
    if(i>0){
      const sep=document.createElement('span');
      sep.className='seq-sep'; sep.textContent='›';
      sbi.appendChild(sep);
    }
    const chip=document.createElement('span');
    chip.className=`seq-chip ${s}`;
    chip.textContent=`${ltr}${s==='done'?' ✓':''} (${m.br==='L'?'LB':'W'})`;
    sbi.appendChild(chip);
  });

  // Next label — use display label
  const nextId=tmpl.recSeq.find(id=>st[id]==='next');
  const nextDL=nextId ? dl[nextId] : null;
  document.getElementById('next-label').textContent=
    nextDL ? `▶ Next: Match ${nextDL}` : (wf&&lf)?'✓ Complete':'';

  // LB heading — use display label for W Final
  const wfId=Object.keys(tmpl.matches).find(k=>tmpl.matches[k].isWF);
  const wfDL=wfId ? (dl[wfId]||wfId) : '?';
  document.getElementById('lb-head').innerHTML=
    `⬇ Losers Bracket <span style="font-size:10px;color:#4a4f5a;font-weight:400;margin-left:6px;font-family:monospace;">
    loser of W Final (Match ${wfDL}) drops to LB Final</span>`;

  // Brackets — pass dl through
  renderSection(document.getElementById('wb'),tmpl.wCols,ms,wPositions(tmpl.wCols),st,dl);
  const lEl=document.getElementById('lb');
  if(!tmpl.lCols.length){
    lEl.innerHTML='<p style="color:#3a3f4a;font-size:12px;padding:8px">No losers bracket for this size.</p>';
    return;
  }
  renderSection(lEl,tmpl.lCols,ms,lPositions(tmpl.lCols),st,dl);
}

function renderSection(container,cols,ms,pos,st,dl){
  const allIds=cols.flat();
  let maxX=0,maxY=0;
  allIds.forEach(id=>{
    const p=pos[id];
    if(p){maxX=Math.max(maxX,p.x+CW);maxY=Math.max(maxY,p.y+CH);}
  });
  const W=maxX+20,H=maxY+24;
  container.innerHTML='';
  container.style.cssText=`position:relative;width:${W}px;height:${H}px;`;

  // SVG
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
  container.appendChild(svg);

  const colOf={};
  cols.forEach((col,ci)=>col.forEach(id=>colOf[id]=ci));

  // Connectors
  allIds.forEach(id=>{
    const m=ms[id]; const p=pos[id];
    if(!m?.ff||!p) return;
    const clr='#222840';

    ['t','b'].forEach((slot,si)=>{
      const spec=m.ff[slot];
      if(!spec) return;
      const [type,srcId]=spec.split(':');
      const sp=pos[srcId];
      if(!sp) return;

      const srcM=ms[srcId];
      let srcY=sp.cy;
      if(srcM?.done){
        if(type==='winner') srcY=srcM.winner===srcM.top?sp.topY:sp.botY;
        else srcY=srcM.loser===srcM.top?sp.topY:sp.botY;
      }

      const destY=si===0?p.topY:p.botY;
      const samePrevCol=colOf[srcId]!==undefined && colOf[id]!==undefined &&
                        colOf[srcId]===colOf[id]-1;
      const partnerSlot=si===0?m.ff.b:m.ff.t;
      const partnerId=partnerSlot?partnerSlot.split(':')[1]:null;
      const partnerInSameCol=partnerId && colOf[partnerId]===colOf[srcId];

      if(samePrevCol && partnerInSameCol){
        // Bracket shape — both sources in same previous column
        const midX=sp.rx+CG/2;
        line(svg,sp.rx,srcY,midX,srcY,clr);
        // vertical from srcY to midpoint of both slots
        const psp=pos[partnerId];
        if(psp){
          let pSrcY=psp.cy;
          if(ms[partnerId]?.done){
            const type2=(si===0?m.ff.b:m.ff.t).split(':')[0];
            const pm=ms[partnerId];
            if(type2==='winner') pSrcY=pm.winner===pm.top?psp.topY:psp.botY;
            else pSrcY=pm.loser===pm.top?psp.topY:psp.botY;
          }
          line(svg,psp.rx,pSrcY,midX,pSrcY,clr);
          line(svg,midX,srcY,midX,pSrcY,clr);
          line(svg,midX,p.cy,p.lx,p.cy,clr);
        }
      } else {
        // Individual routed line
        const midX=sp.rx+CG/2;
        line(svg,sp.rx,srcY,midX,srcY,clr);
        line(svg,midX,srcY,midX,destY,clr);
        line(svg,midX,destY,p.lx,destY,clr);
      }
    });
  });

  // Cards
  allIds.forEach(id=>{
    const m=ms[id]; const p=pos[id];
    if(!m||!p) return;
    const s=st[id]; const playable=isPlayable(m); const isNext=s==='next';

    const card=document.createElement('div');
    card.className='mc';
    if(m.isBye) card.classList.add('bye');
    else if(m.done) card.classList.add('done');
    else if(isNext) card.classList.add('next');
    else if(playable) card.classList.add('ready');
    if(m.isWF) card.classList.add('wf');
    if(m.isLF) card.classList.add('lf');
    card.style.left=p.x+'px'; card.style.top=p.y+'px';

    const hd=document.createElement('div');
    hd.className='mc-hd';
    // Use display label for real matches; byes show no letter
    const dispLtr = m.isBye ? '' : (dl[id] || id);
    hd.innerHTML=`<span class="mc-id">${dispLtr}</span><span class="mc-lbl">${m.lbl}</span>`;
    card.appendChild(hd);

    card.appendChild(mkSlot(m,'top',isNext,dl));
    const dv=document.createElement('div');
    dv.style.cssText='height:1px;background:#1a1d24;';
    card.appendChild(dv);
    card.appendChild(mkSlot(m,'bottom',isNext,dl));

    container.appendChild(card);
  });
}

function schoolOf(name) {
  if (!name || !S.competitors) return '';
  const c = S.competitors.find(c => c.name === name);
  return c ? c.school : '';
}

function mkSlot(m,which,isNext,dl){
  const name=which==='top'?m.top:m.bottom;
  const ff=m.ff?(which==='top'?m.ff.t:m.ff.b):null;
  const div=document.createElement('div');
  div.className='mc-slot';

  if(m.isBye){
    if(which==='top'){div.textContent=name||'—';}
    else{div.className+=' bye-s';div.textContent='BYE';}
    return div;
  }

  // Helper: build name node with optional school tag (first-round = no ff on match)
  const isFirstRound = !m.ff;
  function nameNode(n, showSchool) {
    if (!showSchool || !isFirstRound) return document.createTextNode(n||'—');
    const school = schoolOf(n);
    const frag = document.createDocumentFragment();
    frag.appendChild(document.createTextNode(n||'—'));
    if (school) {
      const tag = document.createElement('span');
      tag.className = 'school-tag';
      tag.textContent = '(' + school + ')';
      frag.appendChild(tag);
    }
    return frag;
  }

  if(m.done){
    const isW=name===m.winner;
    div.className+=isW?' won':' lost';
    if(isW){
      div.appendChild(document.createTextNode('✓ '+name));
    } else {
      div.textContent=name||'—';
    }
    return div;
  }

  if(name){
    if(isPlayable(m)){
      div.className+=' click';
      div.appendChild(nameNode(name, true));
      if(isNext){
        const t=document.createElement('span');
        t.className='tap-hint'; t.textContent='TAP';
        div.appendChild(t);
      }
      div.addEventListener('click',()=>openWinnerEntry(m.id, name));
    } else {
      div.appendChild(nameNode(name, true));
    }
  } else {
    div.className+=' tbd';
    div.textContent=ff?ph(ff,dl):'—';
  }
  return div;
}

function ph(spec, dl){
  const [type,src]=spec.split(':');
  const label = (dl && dl[src]) || src;
  return type==='winner'?`W of ${label}`:`L of ${label}`;
}

// ════════════════════════════════════════════════════════
// WINNER ENTRY — inline name confirmation
// Accepts first name only when it's unique in the match.
// Requires full name when both competitors share a first name.
// ════════════════════════════════════════════════════════
function openWinnerEntry(matchId, tappedName) {
  const m = S.matches[matchId];
  if (!m || !isPlayable(m)) return;

  S.activeEntry = matchId;
  S.activeWinner = tappedName; // the name that was tapped

  const top = m.top, bot = m.bottom;
  const other = tappedName === top ? bot : top;
  const tappedFirst = tappedName.split(' ')[0];
  const otherFirst  = other.split(' ')[0];
  const sameFirst   = tappedFirst.toLowerCase() === otherFirst.toLowerCase();

  const dl = getDisplayLabels();
  document.getElementById('winner-modal-title').textContent =
    `Match ${dl[matchId]||matchId} — Confirm Winner`;
  document.getElementById('winner-modal-vs').innerHTML =
    `Tapped: <strong>${tappedName}</strong><br>
     <span style="color:#4a4f5a;font-size:11px;">vs ${other}</span>`;
  document.getElementById('winner-modal-hint').textContent = sameFirst
    ? `Both share first name "${tappedFirst}" — type full name to confirm`
    : `Type "${tappedFirst}" or full name to confirm`;
  document.getElementById('winner-entry-error').style.display = 'none';
  document.getElementById('winner-entry-error').textContent = '';

  document.getElementById('winner-modal-bg').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('winner-entry-input');
    if (inp) { inp.value = ''; inp.focus(); }
  }, 60);
}

function cancelWinnerEntry() {
  S.activeEntry = null;
  S.activeWinner = null;
  document.getElementById('winner-modal-bg').classList.remove('open');
  document.getElementById('winner-entry-input').value = '';
}

function confirmWinnerEntry() {
  const matchId = S.activeEntry;
  const expected = S.activeWinner; // the name that was tapped
  const m = S.matches[matchId];
  if (!m || !isPlayable(m) || !expected) return;

  const inp = document.getElementById('winner-entry-input');
  if (!inp) return;
  const typed = inp.value.trim();
  if (!typed) return;

  const t = typed.toLowerCase();
  const expFull  = expected.toLowerCase();
  const expFirst = expected.split(' ')[0].toLowerCase();

  const other = expected === m.top ? m.bottom : m.top;
  const otherFirst = other.split(' ')[0].toLowerCase();
  const sameFirst  = expFirst === otherFirst;

  // If same first names, require full name
  // If different first names, accept first OR full — but only for the tapped competitor
  let matched = false;
  if (sameFirst) {
    matched = (t === expFull);
  } else {
    matched = (t === expFull || t === expFirst);
  }

  if (!matched) {
    // Check if they typed the OTHER person's name — give specific error
    const otherFull = other.toLowerCase();
    const typedOther = (t === otherFull || (!sameFirst && t === otherFirst));
    if (typedOther) {
      showEntryError(`You tapped ${expected.split(' ')[0]} but typed ${other.split(' ')[0]}. Tap the correct name on the bracket.`);
    } else {
      showEntryError(sameFirst
        ? `Type the full name: "${expected}"`
        : `Type "${expected.split(' ')[0]}" or "${expected}" to confirm.`);
    }
    return;
  }

  document.getElementById('winner-modal-bg').classList.remove('open');
  document.getElementById('winner-entry-input').value = '';
  S.activeEntry = null;
  S.activeWinner = null;
  selectWinner(matchId, expected);
}

function showEntryError(msg) {
  const err = document.getElementById('winner-entry-error');
  if (err) {
    err.textContent = msg;
    err.style.display = 'block';
  }
  const inp = document.getElementById('winner-entry-input');
  if (inp) { inp.value = ''; inp.focus(); }
}

function line(svg,x1,y1,x2,y2,clr){
  const el=document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',Math.round(x1));el.setAttribute('y1',Math.round(y1));
  el.setAttribute('x2',Math.round(x2));el.setAttribute('y2',Math.round(y2));
  el.setAttribute('stroke',clr);el.setAttribute('stroke-width','1.5');
  svg.appendChild(el);
}

// ════════════════════════════════════════════════════════
// SAME-SCHOOL R1 AVOIDANCE
// Rearranges seed positions to avoid same-school R1 matchups.
// Tries swapping conflicting competitors with others until
// no R1 pair shares a school, or no valid swap exists.
// ════════════════════════════════════════════════════════
const R1_PAIRS = {
  2:[[1,2]],
  3:[[2,3]],
  4:[[1,4],[2,3]],
  5:[[4,5]],
  6:[[4,5],[3,6]],
  7:[[4,5],[2,7],[3,6]],
  8:[[1,8],[4,5],[2,7],[3,6]]
};

function avoidSameSchoolR1(names, schools, n) {
  const pairs = R1_PAIRS[n];
  if (!pairs) return { names:[...names], schools:[...schools] };

  const ns = [...names];
  const sc = [...schools];

  function conflictExists() {
    return pairs.some(([s1,s2]) => {
      const i=s1-1, j=s2-1;
      return j>=0 && j<n && sc[i] && sc[j] && sc[i]===sc[j];
    });
  }

  for (let pass = 0; pass < n*3 && conflictExists(); pass++) {
    for (const [s1,s2] of pairs) {
      const i=s1-1, j=s2-1;
      if (j<0||j>=n||!sc[i]||!sc[j]||sc[i]!==sc[j]) continue;
      // Try swapping j (bottom of conflicting pair) with each other position
      let resolved = false;
      for (let k=0; k<n && !resolved; k++) {
        if (k===i||k===j) continue;
        [ns[j],ns[k]]=[ns[k],ns[j]];
        [sc[j],sc[k]]=[sc[k],sc[j]];
        if (!conflictExists()) { resolved=true; break; }
        // Revert if it didn't help
        [ns[j],ns[k]]=[ns[k],ns[j]];
        [sc[j],sc[k]]=[sc[k],sc[j]];
      }
      // If swapping j didn't work, try swapping i (top of conflicting pair)
      if (!resolved) {
        for (let k=0; k<n; k++) {
          if (k===i||k===j) continue;
          [ns[i],ns[k]]=[ns[k],ns[i]];
          [sc[i],sc[k]]=[sc[k],sc[i]];
          if (!conflictExists()) break;
          [ns[i],ns[k]]=[ns[k],ns[i]];
          [sc[i],sc[k]]=[sc[k],sc[i]];
        }
      }
    }
  }

  return { names:ns, schools:sc };
}

function toggleScratch(btn){
  const row=btn.closest('.comp-row');
  row.classList.toggle('scratched');
  btn.classList.toggle('scratched');
}

function buildBracket(){
  const rows=document.querySelectorAll('.comp-row');
  let active=[];
  rows.forEach(row=>{
    if(!row.classList.contains('scratched')){
      const inputs=row.querySelectorAll('input');
      const v=inputs[0].value.trim();
      const school=inputs[1]?inputs[1].value.trim():'';
      if(v) active.push({name:v, school});
    }
  });

  // Forms mode: entry order is placement (1st→best). Reverse so last place → seed 1 → gets bye.
  if(formsMode) active.reverse();

  let names=active.map(c=>c.name);
  let activeSchools=active.map(c=>c.school);
  const n=names.length;
  if(n<2){alert('Need at least 2 competitors.');return;}
  if(n>8){alert('Prototype supports 2–8.');return;}
  if(!T[n]){alert(`No template for ${n}.`);return;}

  // Apply same-school R1 avoidance
  const avoided = avoidSameSchoolR1(names, activeSchools, n);
  names = avoided.names;
  activeSchools = avoided.schools;

  S={n,names,schools:activeSchools,
     competitors:active.map(c=>({name:c.name,school:c.school})),
     matches:{},history:[],activeEntry:null,activeWinner:null};
  S.matches=initMatches(n,names);
  autoAdvanceByes(S.matches);

  document.getElementById('setup').style.display='none';
  document.getElementById('bd').style.display='block';
  render();
}

// Init — start with 6 empty slots
buildUI(6);

// Modal keyboard and backdrop handlers
document.getElementById('winner-entry-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmWinnerEntry();
  if (e.key === 'Escape') cancelWinnerEntry();
});
document.getElementById('winner-modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('winner-modal-bg')) cancelWinnerEntry();
});
</script>
